<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wendy's Garden | Nature's Peace</title>

<style>

/* ==============================
   VARIABLES
============================== */
:root {
    --primary-dark: #1b3022;
    --accent-lime: #a8e063;
    --soft-white: #f4f7f4;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: "Merriweather", Georgia, serif;
    background: var(--soft-white);
    overflow-x: hidden;
}

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}

/* BACKGROUND */
.hero-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('image/LOGO.png') center/cover no-repeat;
    animation: zoomBg 20s ease-in-out infinite alternate;
    z-index: 0;
}

/* ZOOM */
@keyframes zoomBg {
    0% { transform: scale(1); }
    100% { transform: scale(1.12); }
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75));
    backdrop-filter: blur(3px);
    z-index: 1;
}

/* CONTENT */
.hero-content {
    position: relative;
    z-index: 2;
    color: #fff;
    max-width: 700px;
    padding: 20px;
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 20px;
}

/* REVEAL BASE */
.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* TITLE */
.hero-content h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    margin-bottom: 20px;
}

/* TEXT */
.hero-content p {
    font-size: 1.2rem;
    margin-bottom: 30px;
    color: var(--accent-lime);
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 14px 40px;
    background: #355e3b;
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    letter-spacing: 1px;
    transition: 0.4s ease;
}

.btn:hover {
    background: transparent;
    border: 1px solid var(--accent-lime);
    color: var(--accent-lime);
}

/* FLOAT LIGHT */
.hero::before {
    content: "";
    position: absolute;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle, rgba(168,224,99,0.08), transparent 70%);
    animation: floatLight 18s linear infinite;
    z-index: 1;
}

@keyframes floatLight {
    0% { transform: translate(-20%, -20%); }
    100% { transform: translate(20%, 20%); }
}

</style>
</head>

<body>

<header class="hero">

    <div class="hero-bg"></div>
    <div class="overlay"></div>

    <div class="hero-content">
        
        <!-- OPTIONAL LOGO -->
        <!-- Replace with your generated image -->
        <img src="image/logo.png" class="logo reveal">

        <h1 class="reveal">Welcome to Wendy's Garden 🌿</h1>
        <p class="reveal">Vibrant blooms and living plants to bring peace, beauty, and life into your space.</p>
        <a href="home.html" class="btn reveal">Visit Now</a>

    </div>

</header>

<script>

// ==============================
// LOAD ANIMATION
// ==============================
window.addEventListener("load", () => {
    const elements = document.querySelectorAll(".reveal");

    elements.forEach((el, index) => {
        setTimeout(() => {
            el.classList.add("active");
        }, index * 250);
    });
});


// ==============================
// SCROLL REVEAL
// ==============================
window.addEventListener("scroll", () => {
    const reveals = document.querySelectorAll(".reveal");

    reveals.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;

        if (elementTop < windowHeight - 100) {
            el.classList.add("active");
        }
    });
});


// ==============================
// BUTTON CLICK EFFECT
// ==============================
const btn = document.querySelector(".btn");

if (btn) {
    btn.addEventListener("click", () => {
        btn.style.transform = "scale(0.95)";
        setTimeout(() => {
            btn.style.transform = "scale(1)";
        }, 150);
    });
}


// ==============================
// MOUSE PARALLAX
// ==============================
window.addEventListener("mousemove", (e) => {
    const bg = document.querySelector(".hero-bg");

    if (bg) {
        let x = (e.clientX / window.innerWidth - 0.5) * 10;
        let y = (e.clientY / window.innerHeight - 0.5) * 10;

        bg.style.transform = `scale(1.12) translate(${x}px, ${y}px)`;
    }
});

</script>

</body>
</html>
